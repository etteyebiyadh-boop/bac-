<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="200" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="#ffffff" fill-opacity="0.03"/>
  <circle cx="600" cy="315" r="300" fill="#ffffff" fill-opacity="0.02"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main Content Group -->
  <g transform="translate(60, 80)">
    
    <!-- Badge -->
    <rect x="0" y="0" width="280" height="40" rx="20" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="140" y="26" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="0.1em">🇹🇳 BAC TUNISIE 2026</text>
    
    <!-- Main Title -->
    <text x="0" y="120" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#textGradient)" filter="url(#glow)">
      Bac Excellence
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="170" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#E0E7FF" fill-opacity="0.9">
      La Plateforme IA Officielle du Baccalauréat Tunisien
    </text>
    
    <!-- Divider -->
    <rect x="0" y="200" width="80" height="4" rx="2" fill="#ffffff" fill-opacity="0.5"/>
    
    <!-- Features -->
    <g transform="translate(0, 240)">
      <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#ffffff">
        ✅ Corrections IA Réalistes • 8 Modules • 6 Langues
      </text>
      <text x="0" y="35" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#ffffff">
        ✅ Examens Officiels • 50,000+ Élèves • Mention Très Bien
      </text>
    </g>
    
    <!-- Stats Box -->
    <g transform="translate(0, 350)">
      <rect width="540" height="100" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
      
      <!-- Stat 1 -->
      <text x="90" y="45" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">50K+</text>
      <text x="90" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#E0E7FF" text-anchor="middle">Élèves</text>
      
      <!-- Divider -->
      <line x1="180" y1="25" x2="180" y2="75" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
      
      <!-- Stat 2 -->
      <text x="270" y="45" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">250K+</text>
      <text x="270" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#E0E7FF" text-anchor="middle">Corrections</text>
      
      <!-- Divider -->
      <line x1="360" y1="25" x2="360" y2="75" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
      
      <!-- Stat 3 -->
      <text x="450" y="45" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">4.8★</text>
      <text x="450" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#E0E7FF" text-anchor="middle">Satisfaction</text>
    </g>
    
  </g>
  
  <!-- Right Side Visual -->
  <g transform="translate(680, 100)">
    <!-- Card Stack -->
    <g transform="rotate(-5, 200, 250)">
      <rect x="0" y="0" width="400" height="250" rx="16" fill="#ffffff" fill-opacity="0.95"/>
      <rect x="0" y="0" width="400" height="250" rx="16" fill="url(#bgGradient)" fill-opacity="0.1"/>
      
      <!-- Card Header -->
      <rect x="20" y="20" width="360" height="50" rx="8" fill="#F3F4F6"/>
      
      <!-- Card Content Lines -->
      <rect x="20" y="90" width="280" height="12" rx="6" fill="#E5E7EB"/>
      <rect x="20" y="115" width="320" height="12" rx="6" fill="#E5E7EB"/>
      <rect x="20" y="140" width="240" height="12" rx="6" fill="#E5E7EB"/>
      
      <!-- Score Badge -->
      <circle cx="340" cy="200" r="35" fill="url(#bgGradient)"/>
      <text x="340" y="195" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">14/20</text>
      <text x="340" y="212" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#ffffff" text-anchor="middle" fill-opacity="0.8">Score</text>
    </g>
    
    <!-- Floating Elements -->
    <g transform="translate(320, 20)">
      <circle cx="0" cy="0" r="30" fill="#10B981"/>
      <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">+3</text>
      <text x="0" y="-8" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="500" fill="#ffffff" text-anchor="middle" fill-opacity="0.8">points</text>
    </g>
    
    <g transform="translate(40, 200)">
      <rect width="80" height="36" rx="18" fill="#F59E0B"/>
      <text x="40" y="23" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">BAC 2026</text>
    </g>
  </g>
  
  <!-- Bottom Bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#000000" fill-opacity="0.2"/>
  <text x="600" y="605" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">
    bac-excellence.vercel.app • Gratuit pour commencer
  </text>
  
  <!-- Corner Accents -->
  <polygon points="0,0 80,0 0,80" fill="#ffffff" fill-opacity="0.05"/>
  <polygon points="1200,630 1120,630 1200,550" fill="#ffffff" fill-opacity="0.05"/>
</svg>
